<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Iwan Satriawan — Link Bio</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #050505;
      font-family: 'Inter', sans-serif;
      color: #e5e5e5;
    }
    h1, .serif-font {
      font-family: 'Playfair Display', serif;
    }
    .gold-border-strong {
      border: 3px solid #d4af37;
    }
    .gold-accent {
      color: #d4af37;
    }
    .btn-primary {
      background: #d4af37;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-weight: 700;
      border: 2px solid #d4af37;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: #050505;
      color: #d4af37;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }
    .btn-secondary {
      background: transparent;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-weight: 500;
      border: 2px solid #444;
      transition: all 0.3s ease;
    }
    .btn-secondary:hover {
      border-color: #d4af37;
      color: #d4af37;
      background: rgba(212, 175, 55, 0.05);
    }
    .hr-strong {
      border-top: 3px solid #d4af37;
      width: 60px;
      margin: 1.5rem auto;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10">

  <main class="w-full max-w-md text-center">
    <!-- Card Container -->
    <section class="rounded-none p-8 md:p-10 bg-[#0a0a0a] gold-border-strong relative shadow-[0_15px_40px_rgba(0,0,0,0.8)]">
      
      <!-- Inner Accent Line for Luxurious Frame -->
      <div class="absolute inset-2 border border-[#d4af37]/30 pointer-events-none"></div>

      <!-- Foto Profil (Square with thick borders for strong lines) -->
      <img src="https://via.placeholder.com/250"
           alt="Foto Iwan Satriawan"
           class="relative w-28 h-28 md:w-32 md:h-32 rounded-none mx-auto object-cover border-4 border-[#d4af37] p-1 bg-black z-10">

      <!-- Nama & Keahlian -->
      <h1 class="mt-8 text-2xl md:text-3xl font-bold uppercase tracking-widest text-white">Iwan Satriawan</h1>
      <p class="mt-3 text-[10px] md:text-xs font-semibold tracking-[0.25em] gold-accent uppercase">Web Developer · Conceptor</p>

      <!-- Strong Divider -->
      <div class="hr-strong"></div>

      <!-- Deskripsi singkat -->
      <p class="mt-4 text-sm text-gray-400 leading-loose px-2">
        Menghadirkan desain website modern, tulisan kreatif, dan strategi konsep digital
        dengan sentuhan profesional bernilai tinggi.
      </p>

      <!-- Tombol Aksi -->
      <div class="mt-8 grid gap-4">
        <a href="https://example.com/portfolio" target="_blank"
           class="block py-3.5 btn-primary text-[11px] md:text-xs">
           Lihat Portfolio
        </a>
        <a href="https://example.com/blog" target="_blank"
           class="block py-3.5 btn-secondary text-[11px] md:text-xs">
           Artikel & Blog
        </a>
        <a href="mailto:iwan@example.com"
           class="block py-3.5 btn-secondary text-[11px] md:text-xs">
           Hubungi via Email
        </a>
      </div>

      <!-- Ikon Sosial -->

      <!-- Footer -->
      <div class="mt-8 pt-6 border-t border-[#222] text-[10px] tracking-[0.2em] text-gray-600 uppercase">
        © 2025 <span class="gold-accent font-semibold">Iwan Satriawan</span>
      </div>
    </section>
  </main>

</body>
</html>
